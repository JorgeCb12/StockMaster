<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockMaster - Gestión de Inventario</title>
    <link rel="stylesheet" href="/src/styles/globals.css" />
  </head>

  <body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-lg flex items-center justify-center"
          >
            <span class="text-white font-bold text-lg">S</span>
          </div>
          <div>
            <h1 class="text-xl font-bold text-gray-900">StockMaster</h1>
            <p class="text-xs text-gray-500 uppercase tracking-wider">
              Gestión de Inventario
            </p>
          </div>
        </div>

        <input
          type="text"
          placeholder="Buscar en el catálogo..."
          class="px-4 py-2 bg-gray-100 rounded-lg text-sm text-gray-700 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 w-64"
        />
      </div>
    </header>

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-6 py-8">
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
        <!-- Sidebar -->
        <aside class="lg:col-span-1">
          <div
            class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 sticky top-8"
          >
            <h2 class="text-lg font-bold text-gray-900 mb-1">
              Detalles del Producto
            </h2>
            <p class="text-sm text-gray-500 mb-6">
              Completa la información del artículo.
            </p>

            <div class="space-y-5">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                  Nombre del Producto
                </label>
                <input
                  type="text"
                  class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                />
              </div>

              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2"
                    >Precio</label
                  >
                  <input
                    type="number"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                  />
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2"
                    >Stock</label
                  >
                  <input
                    type="number"
                    class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                  />
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2"
                  >Descripción</label
                >
                <textarea
                  rows="4"
                  class="w-full px-3 py-2 border rounded-lg resize-none focus:ring-2 focus:ring-blue-500"
                ></textarea>
              </div>

              <button
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-lg"
              >
                GUARDAR PRODUCTO
              </button>

              <button
                class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2.5 rounded-lg"
              >
                LIMPIAR FORMULARIO
              </button>
            </div>
          </div>
        </aside>

        <!-- Content -->
        <section class="lg:col-span-3">
          <!-- Stats -->
          <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl border">
              <p class="text-xs text-gray-500">Total SKU</p>
              <p class="text-3xl font-bold"></p>
            </div>

            <div class="bg-white p-6 rounded-xl border">
              <p class="text-xs text-gray-500">Valor Inventario</p>
              <p class="text-2xl font-bold text-blue-600"></p>
            </div>

            <div class="bg-white p-6 rounded-xl border border-red-200">
              <p class="text-xs text-gray-500">Stock Crítico</p>
              <p class="text-3xl font-bold text-red-600"></p>
            </div>
          </div>

          <!-- Table -->
          <div class="bg-white rounded-xl border overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-gray-50">
                <tr>
                  <th class="text-left px-6 py-4">PRODUCTO / DESCRIPCION</th>
                  <th class="text-left px-6 py-4">STOCK</th>
                  <th class="text-left px-6 py-4">PRECIO UNIT.</th>
                  <th class="text-center px-6 py-4">ACCIONES</th>
                </tr>
              </thead>

              <tbody id="renderPd" divide-y"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
