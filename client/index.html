<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockMaster - Gestión de Inventario</title>
    <link rel="stylesheet" href="/src/styles/globals.css" />
  </head>

  <body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-lg flex items-center justify-center"
          >
            <span class="text-white font-bold text-lg">S</span>
          </div>
          <div>
            <h1 class="text-xl font-bold text-gray-900">StockMaster</h1>
            <p class="text-xs text-gray-500 uppercase tracking-wider">
              Gestión de Inventario
            </p>
          </div>
        </div>

        <input
          type="text"
          placeholder="Buscar en el catálogo..."
          class="px-4 py-2 bg-gray-100 rounded-lg text-sm text-gray-700 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 w-64"
        />
      </div>
    </header>

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-6 py-8">
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
        <!-- Sidebar -->
        <aside class="lg:col-span-1">
          <div
            class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 sticky top-8"
          >
            <h2 class="text-lg font-bold text-gray-900 mb-1">
              Detalles del Producto
            </h2>
            <p class="text-sm text-gray-500 mb-6">
              Completa la información del artículo.
            </p>

            <div id="containerForm"></div>
          </div>
        </aside>

        <!-- Content -->
        <section class="lg:col-span-3">
          <!-- Stats -->
          <div id="containerStatistics"></div>
          <!-- Table -->
          <div class="bg-white rounded-xl border overflow-hidden">
            <table class="w-full text-sm">
              <thead class="bg-gray-50">
                <tr>
                  <th class="text-left px-6 py-4">PRODUCTO / DESCRIPCION</th>
                  <th class="text-left px-6 py-4">STOCK</th>
                  <th class="text-left px-6 py-4">PRECIO UNIT.</th>
                  <th class="text-center px-6 py-4">ACCIONES</th>
                </tr>
              </thead>

              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </body>

  <script type="module" src="/src/main.js"></script>
</html>
